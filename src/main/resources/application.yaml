app:
  request:
    base-url: "https://etd.nl/fr/online-shop?websearch={ean}"
    timeout-seconds: 20
    user-agent: "Mozilla/5.0 TireLookupBot/1.0"
  parsing:
    mode: "html"
    image-css-selector: "img.shop-thumb-img"
    image-attribute: "src"
    json-image-path: "/product/image"
  excel:
    sheet-index: 0
    ean-column-name: "ean"
    output-image-column-name: "image_url"
    output-status-column-name: "status"

logging:
  level:
    root: INFO
    bpr.photo.pneu: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
  file:
    name: logs/app.log